[cldf]

[jd]
  csa_encryption_key = "d1093c0060d50a3c89c189b2e485da5a3ce57f3dcb38ab7e2c0d5f0bb2314a44"
  image = "job-distributor:local"

# EVM blockchains (Anvil)
[[blockchains]]
  container_name = "blockchain-src"
  chain_id = "1337"
  docker_cmd_params = ["-b", "1", "--mixed-mining", "--slots-in-an-epoch", "1"]
  image = "ghcr.io/foundry-rs/foundry:latest"
  port = "8545"
  type = "anvil"

[[blockchains]]
  container_name = "blockchain-dst"
  chain_id = "2337"
  docker_cmd_params = ["-b", "1", "--mixed-mining", "--slots-in-an-epoch", "1"]
  image = "ghcr.io/foundry-rs/foundry:latest"
  port = "8555"
  type = "anvil"

# Stellar (localnet)
[[blockchains]]
  container_name = "blockchain-stellar"
  chain_id = "baefd734b8d3e48472cff83912375fedbc7573701912fe308af730180f97d74a" 
  port = "8010"
  type = "stellar"

[fake]
  image = "ccv-fakes:dev"
  port = 9111
  source_code_path = "chainlink-ccv/build/devenv/fakes"
  root_path = "../chainlink-ccv"

[pricer]
  image = "pricer:dev"
  source_code_path = "chainlink-ccv/pricer"
  root_path = "../chainlink-ccv"
  [pricer.keystore]
    address = "0x9221E2E83903C731C2927CCd84e5fa02B22Bb1E2"
    file_path = "../pricer/keystore.json"
    password = "keystore_test_password"

## Verifier Setup
[[verifier]]
  chain_family = "stellar"
  image = "stellarcommittee-verifier:dev"
  container_name = "default-verifier-1"
  nop_alias = "default-verifier-1"
  port = 8100
  source_code_path = "chainlink-ccv/verifier"
  root_path = "../chainlink-ccv"
  committee_name = "default"
  node_index = 0
  disable_finality_checkers = ["17301180955411967724"] # May not be needed for Stellar
  [verifier.db]
    image = "postgres:16-alpine"
    name = "default-verifier-1-db"
    port = 8432

[[verifier]]
  chain_family = "stellar"
  image = "stellarcommittee-verifier:dev"
  container_name = "default-verifier-2"
  nop_alias = "default-verifier-2"
  port = 8200
  source_code_path = "chainlink-ccv/verifier"
  root_path = "../chainlink-ccv"
  committee_name = "default"
  node_index = 1
  disable_finality_checkers = ["17301180955411967724"]
  [verifier.db]
    image = "postgres:16-alpine"
    name = "default-verifier-2-db"
    port = 8433

