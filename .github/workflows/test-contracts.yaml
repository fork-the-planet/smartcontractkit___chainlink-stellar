name: Soroban Contract Tests

on:
  merge_group:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  test-contracts:
    permissions:
      contents: read
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9
        with:
          toolchain: "1.93.1"
          targets: wasm32v1-none
          components: rustfmt

      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2

      - name: Install Just
        uses: extractions/setup-just@e33e0265a09d6d736e2ee1e0eb685ef1de4669ff # v3

      - name: Check formatting
        run: just fmt-contracts-check

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@de6bbd1333b8f331563d54a051e542c7dfef81c3 # v2.68.34
        with:
          tool: cargo-llvm-cov

      - name: Run contract tests with coverage
        run: cargo llvm-cov --no-report --workspace --target $(rustc -vV | grep host | awk '{print $2}')

      - name: Generate coverage report
        run: cargo llvm-cov report --target $(rustc -vV | grep host | awk '{print $2}') --output-path coverage.txt

      - name: Write full coverage to job summary
        if: github.event_name == 'pull_request'
        run: |
          echo '## Soroban Contract Test Coverage' >> $GITHUB_STEP_SUMMARY
          echo '' >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat coverage.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Post coverage comment
        if: github.event_name == 'pull_request'
        env:
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          TOTAL_LINE=$(grep 'TOTAL' coverage.txt | tail -1 || echo 'No coverage summary found')
          cat > coverage-summary.md <<EOF
          ## Soroban Contract Test Coverage

          \`\`\`
          ${TOTAL_LINE}
          \`\`\`

          [Full coverage report](${RUN_URL})
          EOF
          sed -i 's/^          //' coverage-summary.md

      - name: Post sticky comment
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@67d0dec7b07ed060a405f9b2a64b8ab319fdd7db # v2.9.2
        with:
          header: contract-coverage
          path: coverage-summary.md
