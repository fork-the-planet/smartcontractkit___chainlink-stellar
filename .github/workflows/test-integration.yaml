name: Integration Tests

on:
  merge_group:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  test-integration:
    name: Integration Tests
    permissions:
      contents: read
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9
        with:
          toolchain: "1.93.1"
          targets: wasm32v1-none

      - name: Install Stellar CLI
        run: |
          curl -sL https://github.com/stellar/stellar-cli/releases/download/v25.1.0/stellar-cli-25.1.0-x86_64-unknown-linux-gnu.tar.gz | tar xz
          mv stellar /usr/local/bin/stellar

      - name: Build contracts
        run: make build

      - name: Setup Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: go.mod

      - name: Run integration tests
        run: go test -v -race -tags integration -fullpath -shuffle on -coverpkg=./bindings/contracts/... -coverprofile=coverage-integration.out ./tests/integration/...

      - name: Write full coverage to job summary
        if: github.event_name == 'pull_request'
        run: |
          echo '## Integration Test Coverage' >> $GITHUB_STEP_SUMMARY
          echo '' >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          go tool cover -func=coverage-integration.out >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Post coverage comment
        if: github.event_name == 'pull_request'
        env:
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          TOTAL_LINE=$(go tool cover -func=coverage-integration.out | grep -i 'total' | tail -1 || echo 'No coverage summary found')
          cat > coverage-summary.md <<EOF
          ## Integration Test Coverage

          \`\`\`
          ${TOTAL_LINE}
          \`\`\`

          [Full coverage report](${RUN_URL})
          EOF
          sed -i 's/^          //' coverage-summary.md

      - name: Post sticky comment
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@67d0dec7b07ed060a405f9b2a64b8ab319fdd7db # v2.9.2
        with:
          header: integration-coverage
          path: coverage-summary.md
