name: TruffleHog (PR scan)

# Scans the PR branch delta only (base.sha … head.sha). Full history: trufflehog-full-history.yaml.

on:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  trufflehog:
    name: TruffleHog OSS
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0

      - name: Run TruffleHog (PR delta)
        uses: trufflesecurity/trufflehog@37b77001d0174ebec2fcca2bd83ff83a6d45a3ab # v3.95.3
        with:
          version: "3.95.3"
          extra_args: --only-verified --log-level=2
