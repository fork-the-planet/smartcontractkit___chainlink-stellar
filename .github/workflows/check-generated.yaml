name: Check Generated Code

on:
  merge_group:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  check-generated:
    name: Check Generated Code
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Setup Rust toolchain
        uses: ./.github/actions/setup-rust-toolchain
        with:
          wasm32-target: "true"
          rustfmt: "true"

      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2

      - name: Install Stellar CLI
        uses: ./.github/actions/setup-stellar-cli

      - name: Setup Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: bindings/go.mod

      - name: Regenerate interfaces and bindings
        run: make generate-bindings

      - name: Check for uncommitted changes
        run: |
          git diff --exit-code -- contracts/common/interfaces/ bindings/contracts/ || \
            (echo "Generated code is out of date. Run 'make generate-bindings' and commit the result." && exit 1)
