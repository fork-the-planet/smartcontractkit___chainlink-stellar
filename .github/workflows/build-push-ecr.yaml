name: Build and Push to ECR

on:
  push:
    branches: [main]
    # tags: ['v*'] # could be more useful than branches to specify which images to build and push
  pull_request:
    types: [labeled]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag (defaults to git SHA or tag)'
        required: false
        default: ''
      push_latest:
        description: 'Also push as latest'
        type: boolean
        required: false
        default: true

concurrency:
  group: build-push-ecr-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  if: github.event.label.name == 'push-to-ecr'
  build-push:
    name: Build and Push ${{ matrix.image_name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: committee-verifier
            dockerfile: Dockerfile.verifier
            image_name: ccv-stellar-verifier
            ecr_repository: ${{ secrets.COMMITTEE_VERIFIER_ECR_REPOSITORY }}
          - name: executor
            dockerfile: Dockerfile.executor
            image_name: ccv-stellar-executor
            ecr_repository: ${{ secrets.EXECUTOR_ECR_REPOSITORY }}

    steps:
      - name: Check out code
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v3.11.1

      - name: Configure AWS Credentials (OIDC)
        if: env.AWS_ROLE_ARN != ''
        uses: aws-actions/configure-aws-credentials@e3dd6a429d7300a6a4c196c26e071d42e0343502 # v4.0.2
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_FOR_PUSHING_IMAGE }}
          aws-region: ${{ secrets.AWS_REGION || 'us-west-2' }}
        env:
          AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN_FOR_PUSHING_IMAGE }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@062b18b96a7aff071d4dc91bc00c4c1a7945b076 # v2.0.1
        with:
          registry-type: private

      - name: Build, tag, and push image
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ secrets.ECR_REGISTRY_ID }}/${{ matrix.ecr_repository }}:${{ github.sha }}
